<!DOCTYPE html>
<html lang="ru">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Фитнес Трекер</title>
    <link rel="stylesheet" href="styles/main.css">
    <link rel="icon" type="image/x-icon" href="icons/favicon.ico">
    <link rel="icon" type="image/png" sizes="32x32" href="icons/favicon-32x32.png">
    <link rel="icon" type="image/png" sizes="16x16" href="icons/favicon-16x16.png">
    <link rel="apple-touch-icon" href="icons/apple-touch-icon.png">
    <link rel="android-chrome-192x192" href="icons/android-chrome-192x192.png">
    <link rel="android-chrome-512x512" href="icons/android-chrome-512x512.png">
</head>
<body>
    <!-- Навигация -->
    <div class="nav-container">
        <div class="nav-tabs">
            <button class="nav-tab" data-page="statistics">Статистика</button>
            <button class="nav-tab" data-page="history">История</button>
            <button class="nav-tab" data-page="workout">Тренировка</button>
        </div>
    </div>

    <!-- Страница тренировки -->
    <div id="workoutPage" class="page">
        <!-- Контент тренировки -->
        <div id="workoutContent" class="content-container hidden">
            <div id="exerciseLog"></div>
        </div>

        <!-- Круглая кнопка начала тренировки -->
        <button id="startWorkoutRound" class="round-btn" aria-label="Начать тренировку">+</button>

        <!-- Панель управления -->
        <div id="workoutControls" class="controls-panel">
            <!-- Форма управления тренировкой (изначально скрыта) -->
            <div id="workoutForm" class="hidden">
                <!-- Верхние кнопки -->
                <div class="workout-buttons">
                    <button id="exitWorkout" class="delete-btn">×</button>
                    <div class="center-buttons">
                        <button id="saveWorkout" class="btn workout-btn">Сохранить</button>
                        <button id="workoutNotes" class="btn workout-btn">Заметки</button>
                    </div>
                    <button id="addExercise" class="round-button-base add-exercise-btn" aria-label="Добавить упражнение">+</button>
                </div>
                
                <!-- Новый flex-контейнер -->
                <div class="workout-form-content">
                    <!-- Левая часть с инпутами -->
                    <div class="workout-inputs">
                        <div class="exercise-header">
                            <select id="exerciseName">
                                <option value="" disabled selected>Выберите упражнение</option>
                            </select>
                            
                            <div class="toggle-wrapper">
                                <label class="toggle">
                                    <input type="checkbox" id="exerciseType">
                                    <div class="toggle-slider">
                                        <span class="toggle-label">вес</span>
                                    </div>
                                </label>
                            </div>
                        </div>
                        
                        <div class="form-inputs">
                            <div id="weightInput" class="input-field" data-visible="false">
                                <div class="input-group">
                                    <input type="number" id="exerciseWeight" inputmode="decimal" placeholder="0">
                                    <span class="input-suffix">кг</span>
                                </div>
                                <!-- Слайдер для веса -->
                                <div class="custom-slider" aria-label="Изменить вес">
                                    <div class="slider-track"></div>
                                    <div class="slider-handle"></div>
                                    <div class="slider-value">100</div>
                                </div>
                            </div>
                            <div id="repsInput" class="input-field">
                                <div class="input-group">
                                    <input type="number" id="exerciseReps" inputmode="decimal" placeholder="0">
                                    <span class="input-suffix">раз</span>
                                </div>
                                <!-- Слайдер для повторений -->
                                <div class="custom-slider" aria-label="Изменить количество повторений">
                                    <div class="slider-track"></div>
                                    <div class="slider-handle"></div>
                                    <div class="slider-value">10</div>
                                </div>
                            </div>
                        </div>
                    </div>
            </div>
        </div>
    </div>
    </div>

    <!-- Страница истории -->
    <div id="historyPage" class="page">
        <div class="content-container">
            <div class="history-header">
                <button id="toggleAllWorkouts" class="btn">Разворот</button>
            </div>
            <div id="workoutHistory"></div>
        </div>
    </div>

    <!-- Страница статистики -->
    <div id="statisticsPage" class="page">
        <div class="content-container stats-container">

            <!-- 1. Сводка -->
            <section class="stats-section">
                <h2 class="stats-section-title">Обзор</h2>
                <div class="stats-cards" id="statsCards">
                    <div class="stat-card"><span class="stat-value" id="statTotalWorkouts">—</span><span class="stat-label">Тренировок</span></div>
                    <div class="stat-card"><span class="stat-value" id="statTotalTonnage">—</span><span class="stat-label">Тоннаж (т)</span></div>
                    <div class="stat-card"><span class="stat-value" id="statWeeklyAvg">—</span><span class="stat-label">В неделю</span></div>
                    <div class="stat-card"><span class="stat-value" id="statLastWorkout">—</span><span class="stat-label">Дней назад</span></div>
                </div>
            </section>

            <!-- 2. Частота тренировок -->
            <section class="stats-section">
                <h2 class="stats-section-title">Частота за 12 недель</h2>
                <div class="heatmap-wrap" id="statsHeatmap"></div>
                <div class="heatmap-legend">
                    <span>Меньше</span>
                    <span class="legend-cell lc-0"></span>
                    <span class="legend-cell lc-1"></span>
                    <span class="legend-cell lc-2"></span>
                    <span class="legend-cell lc-3"></span>
                    <span>Больше</span>
                </div>
            </section>

            <!-- 3. Прогресс упражнения -->
            <section class="stats-section">
                <h2 class="stats-section-title">Прогресс</h2>
                <select id="statsExerciseSelect" class="stats-select">
                    <option value="">— Выберите упражнение —</option>
                </select>
                <div class="chart-wrap" id="statsChart">
                    <p class="stats-empty">Выберите упражнение с весом</p>
                </div>
                <div class="chart-record hidden" id="statsChartRecord">
                    🏆 Рекорд: <strong id="statsChartRecordVal">—</strong> кг &nbsp;·&nbsp; <span id="statsChartRecordDate">—</span>
                </div>
            </section>

            <!-- 4. Таблица рекордов -->
            <section class="stats-section">
                <h2 class="stats-section-title">Рекорды</h2>
                <div class="records-wrap" id="statsRecords">
                    <p class="stats-empty">Нет данных</p>
                </div>
            </section>

        </div>
    </div>

    <div id="appLoader" class="loader hidden">
        <div class="loader-spinner"></div>
    </div>

    <datalist id="exercisesList">
        <!-- Будет заполняться динамически -->
    </datalist>
    <script type="module" src="js/main.js"></script>
</body>
</html>
